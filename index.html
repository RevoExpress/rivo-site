<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVO EXPRESS – Premium Delivery Algiers</title>

    <!-- Polices et Icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* THÈME ORANGE ET NOIR */
        :root {
            --bg: #ffffff;
            --text: #0b1220; /* Noir profond */
            --primary: #f39c12; /* Orange REVO */
            --secondary: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.9);
            --border: #e5e7eb;
            --card: #f9fafb;
            --map-filter: none;
        }

        body.dark-mode {
            --bg: #0b1220;
            --text: #f9fafb;
            --secondary: #f39c12;
            --glass: rgba(11, 18, 32, 0.9);
            --border: #2d3748;
            --card: #1a1a1a;
            --map-filter: grayscale(1) invert(1) contrast(0.9);
        }

        [dir="rtl"] { font-family: 'Cairo', sans-serif; }
        [dir="ltr"] { font-family: 'Inter', sans-serif; }

        * { margin:0; padding:0; box-sizing:border-box; transition: 0.3s; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* NAV */
        .nav {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 10px 5%; background: var(--glass);
            backdrop-filter: blur(10px); border-bottom: 2px solid var(--primary); z-index: 1000;
        }
        .logo-area img { height: 80px; width: auto; }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .menu-btns { display: flex; gap: 10px; }
        .menu-btns a { 
            text-decoration: none; color: var(--text); font-weight: 700; font-size: 0.85rem;
            padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border);
        }
        .menu-btns a:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        .ctrl-btn { background: var(--text); color: var(--bg); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.75rem; }

        /* HERO */
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: var(--text); color: #fff; padding: 0 20px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; color: var(--primary); }

        /* CALCULATEUR DE PRIX */
        .calc-box { background: var(--primary); color: #000; padding: 30px; border-radius: 20px; max-width: 600px; margin: -50px auto 40px; position: relative; z-index: 10; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        select { padding: 12px; border-radius: 8px; border: none; font-weight: 600; width: 100%; }
        .price-display { font-size: 2rem; font-weight: 900; margin-top: 15px; display: block; }

        /* FORMULAIRE */
        .section { padding: 60px 10%; }
        .form-box { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid var(--border); max-width: 950px; margin: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-header { grid-column: span 2; color: var(--primary); font-weight: 800; border-bottom: 2px solid var(--primary); margin: 25px 0 10px; }
        input { padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        input:invalid { border-color: #ff4d4d; }
        .full { grid-column: span 2; }
        .submit-btn { grid-column: span 2; background: var(--primary); border: none; padding: 20px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }

        /* MAP */
        .map-wrapper { width: 100%; height: 400px; border-radius: 30px; overflow: hidden; border: 3px solid var(--text); margin-bottom: 40px; }
        .map-wrapper iframe { width: 100%; height: 100%; border: none; filter: var(--map-filter); }

        /* WHATSAPP */
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); text-decoration: none; }

        #status-success { display: none; background: #27ae60; color: white; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; }

        @media (max-width: 800px) { .form-grid, .calc-grid { grid-template-columns: 1fr; } .menu-btns { display: none; } }
    </style>
</head>
<body id="body">

    <a href="https://wa.me/213550000000" class="whatsapp-float" target="_blank"><i data-lucide="message-circle" size="32"></i></a>

    <nav class="nav">
        <div class="logo-area"><img src="logo.png" alt="REVO"></div>
        <div class="nav-right">
            <div class="menu-btns">
                <a href="#map-area">Zone</a>
                <a href="#order">Order</a>
            </div>
            <button class="ctrl-btn" onclick="toggleLang()" id="lang-btn">AR</button>
            <button class="ctrl-btn" onclick="toggleTheme()" id="theme-btn">Dark Mode</button>
        </div>
    </nav>

    <header class="hero">
        <h1 id="hero-title">Premium Delivery</h1>
        <p id="hero-desc">Fast. Secure. Orange.</p>
    </header>

    <!-- CALCULATEUR DE PRIX -->
    <section class="calc-box">
        <h3 id="calc-title">Estimation Tarifaire</h3>
        <div class="calc-grid">
            <select id="start-zone" onchange="calculatePrice()">
                <option value="1">Alger Centre / Sidi M'hamed</option>
                <option value="1">Hydra / El Biar</option>
                <option value="2">Bab Ezzouar / Dar El Beida</option>
                <option value="2">Zeralda / Staoueli</option>
            </select>
            <select id="end-zone" onchange="calculatePrice()">
                <option value="1">Alger Centre / Sidi M'hamed</option>
                <option value="1">Hydra / El Biar</option>
                <option value="2">Bab Ezzouar / Dar El Beida</option>
                <option value="2">Zeralda / Staoueli</option>
            </select>
        </div>
        <span class="price-display"><span id="estimated-price">500</span> DZD</span>
    </section>

    <section id="map-area" class="section">
        <div class="map-wrapper">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d102334.35418197964!2d3.0039268!3d36.7285153!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x128fb2179836471d%3A0x66f68e0d4c72ef21!2sAlger!5e0!3m2!1sfr!2sdz!4v1715800000000!5m2!1sfr!2sdz"></iframe>
        </div>
    </section>

    <section id="order" class="section">
        <div class="form-box">
            <div id="status-success" data-fs-success>Merci ! REVO EXPRESS vous contactera sous peu.</div>
            <form class="form-grid" id="revo-form">
                <div class="form-header" id="fh-1">Expéditeur</div>
                <div class="field"><label id="l-nom1">Nom</label><input type="text" name="sender_last" required></div>
                <div class="field"><label id="l-pre1">Prénom</label><input type="text" name="sender_first" required></div>
                <!-- Validation Algérienne : 05, 06 ou 07 suivis de 8 chiffres -->
                <div class="field"><label id="l-tel1">Téléphone</label><input type="tel" name="sender_tel" pattern="^(05|06|07)[0-9]{8}$" title="Format: 05XXXXXXXX" required></div>
                <div class="field"><label id="l-em1">Email</label><input type="email" name="sender_email"></div>
                <div class="field full"><label id="l-adr1">Adresse de ramassage</label><input type="text" name="sender_addr" required></div>

                <div class="form-header" id="fh-2">Destinataire</div>
                <div class="field"><label id="l-nom2">Nom</label><input type="text" name="dest_last" required></div>
                <div class="field"><label id="l-pre2">Prénom</label><input type="text" name="dest_first" required></div>
                <div class="field"><label id="l-tel2">Téléphone</label><input type="tel" name="dest_tel" pattern="^(05|06|07)[0-9]{8}$" title="Format: 05XXXXXXXX" required></div>
                <div class="field full"><label id="l-adr2">Adresse de livraison</label><input type="text" name="dest_addr" required></div>

                <div class="form-header" id="fh-3">Produit</div>
                <div class="field full"><label id="l-cont">Contenu</label><input type="text" name="prod_desc" required></div>
                <div class="field"><label id="l-poids">Poids (kg)</label><input type="text" name="prod_weight"></div>
                <div class="field"><label id="l-dim">Dimensions</label><input type="text" name="prod_dim"></div>

                <button type="submit" class="submit-btn" id="btn-valider" data-fs-submit-btn>VALIDER LA COMMANDE</button>
            </form>
        </div>
    </section>

    <script>
        // CALCULATEUR DE PRIX SIMPLE
        function calculatePrice() {
            const start = document.getElementById('start-zone').value;
            const end = document.getElementById('end-zone').value;
            let price = 500; // Prix de base

            if (start !== end) {
                price = 800; // Prix si on change de zone (ex: Centre vers Zeralda)
            }
            document.getElementById('estimated-price').innerText = price;
        }

        // LANGUES
        const texts = {
            fr: {
                hT: "Premium Delivery", hD: "Fast. Secure. Orange.", calcT: "Estimation Tarifaire",
                fh1: "Expéditeur", fh2: "Destinataire", fh3: "Produit", lNom: "Nom", lPre: "Prénom", lTel: "Téléphone",
                lEm: "Email", lAdr1: "Adresse d'expédition", lAdr2: "Adresse de livraison", lCont: "Contenu",
                btnV: "VALIDER LA COMMANDE", langBtn: "AR"
            },
            ar: {
                hT: "توصيل بريميوم", hD: "سريع. آمن. برتقالي.", calcT: "تقدير السعر",
                fh1: "المرسل", fh2: "المرسل إليه", fh3: "بيانات الطرد", lNom: "اللقب", lPre: "الاسم", lTel: "الهاتف",
                lEm: "Email", lAdr1: "عنوان الاستلام", lAdr2: "عنوان التوصيل", lCont: "المحتوى",
                btnV: "تأكيد الطلب", langBtn: "FR"
            }
        };

        let currentLang = 'fr';
        function toggleLang() {
            currentLang = (currentLang === 'fr') ? 'ar' : 'fr';
            const lang = texts[currentLang];
            document.documentElement.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('hero-title').innerText = lang.hT;
            document.getElementById('hero-desc').innerText = lang.hD;
            document.getElementById('calc-title').innerText = lang.calcT;
            document.getElementById('fh-1').innerText = lang.fh1;
            document.getElementById('fh-2').innerText = lang.fh2;
            document.getElementById('fh-3').innerText = lang.fh3;
            document.getElementById('btn-valider').innerText = lang.btnV;
            document.getElementById('lang-btn').innerText = lang.langBtn;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('theme-btn').innerText = document.body.classList.contains('dark-mode') ? "Light Mode" : "Dark Mode";
        }

        lucide.createIcons();

        // Formspree
        window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
        formspree('initForm', { 
            formElement: '#revo-form', 
            formId: 'xnjlgenw',
            onSuccess: function() {
                document.getElementById('revo-form').style.display = 'none';
                document.getElementById('status-success').style.display = 'block';
            }
        });
    </script>
    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
