<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVO EXPRESS – Livraison premium Alger</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* VARIABLES DE COULEURS (C'est ici qu'on définit la peinture pour les deux modes) */
        :root {
            --bg-color: #0b1220;
            --text-color: #e5e7eb;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #f39c12;
            --nav-bg: rgba(15, 43, 61, 0.8);
        }

        /* Quand on active le mode clair, on change ces variables */
        body.light-mode {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --border-color: #d1d5db;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* DÉCORATIONS */
        .bg-blur, .bg-blur2 {
            position:fixed; width:500px; height:500px; filter:blur(160px); z-index:-1; pointer-events: none;
        }
        .bg-blur { background: var(--primary); top:-100px; left:-100px; opacity:0.15; }
        .bg-blur2 { background:#1e3a5f; bottom:-150px; right:-150px; opacity:0.2; }

        /* MENU DU HAUT */
        .nav {
            position:fixed; top:0; width:100%; display:flex; justify-content:space-between;
            align-items:center; padding:10px 8%; backdrop-filter:blur(15px);
            background: var(--nav-bg); border-bottom:1px solid var(--border-color); z-index:1000;
        }

        .logo-container { display: flex; align-items: center; gap: 15px; }
        
        /* LOGO AGRANDI ICI */
        .nav img { height: 60px; width: auto; } 
        .nav strong { font-size: 1.4rem; color: var(--primary); }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links a { color: var(--text-color); text-decoration:none; font-weight: 500; }
        
        /* BOUTON MODE CLAIR/SOMBRE */
        #theme-toggle {
            background: var(--primary); border: none; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }

        /* SECTIONS */
        .section { padding: 80px 8% 40px 8%; }
        h2 { text-align:center; font-size:2.2rem; margin-bottom:40px; }

        /* CARTE (DÉPLACÉE PLUS HAUT) */
        .map-wrapper {
            width: 100%; height: 450px; border-radius: 24px; overflow: hidden;
            border: 2px solid var(--primary); margin-bottom: 50px;
        }

        /* FORMULAIRE GÉANT */
        .form-container {
            max-width: 900px; margin: auto; background: var(--card-bg);
            padding: 40px; border-radius: 24px; border: 1px solid var(--border-color);
        }

        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
        }

        .form-section-title {
            grid-column: span 2; color: var(--primary); font-weight: bold;
            border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 20px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; opacity: 0.8; }
        
        input, textarea {
            width:100%; padding:12px; background: rgba(128,128,128,0.1);
            border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-color);
        }

        .btn-submit {
            grid-column: span 2; padding: 18px; background: var(--primary);
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        /* HERO */
        .hero { height: 80vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
        .hero h1 { font-size: 3.5rem; }

        /* MOBILE */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-section-title { grid-column: span 1; }
            .btn-submit { grid-column: span 1; }
        }

        .hidden { opacity:0; transform:translateY(30px); transition: 1s ease-out; }
        .show { opacity:1; transform:translateY(0); }
    </style>
</head>
<body id="body">

<div class="bg-blur"></div>
<div class="bg-blur2"></div>

<nav class="nav">
    <div class="logo-container">
        <img src="logo.png" alt="Logo">
        <strong>REVO EXPRESS</strong>
    </div>
    <div class="nav-right">
        <div class="nav-links">
            <a href="#zone">Zone</a>
            <a href="#order">Commander</a>
        </div>
        <button id="theme-toggle">JOUR / NUIT</button>
    </div>
</nav>

<header class="hero hidden">
    <h1>Livraison Premium Alger</h1>
    <p>Besoin d'envoyer un colis ? Remplissez les détails ci-dessous.</p>
</header>

<!-- LA MAP (Elle est maintenant au dessus du formulaire) -->
<section id="zone" class="section hidden">
    <h2>Notre Zone d'Action (Alger)</h2>
    <div class="map-wrapper">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d102334.35418197964!2d3.0039268!3d36.7285153!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x128fb2179836471d%3A0x66f68e0d4c72ef21!2sAlger!5e0!3m2!1sfr!2sdz!4v1715800000000!5m2!1sfr!2sdz" 
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
        </iframe>
    </div>
</section>

<!-- FORMULAIRE COMPLET -->
<section id="order" class="section hidden">
    <h2>Détails de la livraison</h2>
    <div class="form-container">
        <form id="bigForm" class="form-grid">
            
            <!-- EXPEDITEUR -->
            <div class="form-section-title">📦 L'EXPÉDITEUR (Celui qui envoie)</div>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" placeholder="Nom" required>
            </div>
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" placeholder="Prénom" required>
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" placeholder="05XX XX XX XX" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="exemple@mail.com">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Adresse complète de récupération</label>
                <input type="text" placeholder="Quartier, N° Rue, Appartement..." required>
            </div>

            <!-- DESTINATAIRE -->
            <div class="form-section-title">📍 LE DESTINATAIRE (Celui qui reçoit)</div>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" placeholder="Nom" required>
            </div>
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" placeholder="Prénom" required>
            </div>
            <div class="form-group">
                <label>Téléphone du destinataire</label>
                <input type="tel" placeholder="05XX XX XX XX" required>
            </div>
            <div class="form-group">
                <label>Adresse complète de livraison</label>
                <input type="text" placeholder="Quartier, N° Rue, Appartement..." required>
            </div>

            <!-- LE PRODUIT -->
            <div class="form-section-title">📦 INFORMATIONS SUR LE COLIS</div>
            <div class="form-group">
                <label>Type de produit / Contenu</label>
                <input type="text" placeholder="Ex: Vêtements, Électronique..." required>
            </div>
            <div class="form-group">
                <label>Poids estimé (kg)</label>
                <input type="text" placeholder="Ex: 2kg">
            </div>
            <div class="form-group">
                <label>Dimensions (Largeur x Longueur)</label>
                <input type="text" placeholder="Ex: 30x40 cm">
            </div>

            <button type="submit" class="btn-submit">VALIDER MA COMMANDE</button>
        </form>
    </div>
</section>

<footer style="text-align: center; padding: 50px; opacity: 0.5;">
    REVO EXPRESS © 2026
</footer>

<script>
    // GESTION DU MODE JOUR / NUIT
    const btn = document.getElementById('theme-toggle');
    const body = document.getElementById('body');

    btn.addEventListener('click', () => {
        body.classList.toggle('light-mode');
    });

    // ANIMATION D'APPARITION
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('show');
        });
    });
    document.querySelectorAll('.hidden').forEach(el => observer.observe(el));

    // MESSAGE DE VALIDATION
    document.getElementById('bigForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert("Demande envoyée ! Un agent Revo Express va vous appeler pour confirmer.");
    });
</script>

</body>
</html>
