<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVO EXPRESS – Premium Delivery</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* [Tes styles restent les mêmes, j'ajoute juste les styles pour les messages de succès/erreur] */
        :root {
            --bg: #f9fafb; --text: #111827; --primary: #f39c12; --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1); --nav-bg: rgba(255, 255, 255, 0.9); --map-filter: none;
        }

        body.dark-mode {
            --bg: #0b1220; --text: #f3f4f6; --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1); --nav-bg: rgba(11, 18, 32, 0.9);
            --map-filter: grayscale(1) invert(1) contrast(0.9);
        }

        [dir="rtl"] { font-family: 'Cairo', sans-serif; }
        [dir="ltr"] { font-family: 'Inter', sans-serif; }

        * { margin:0; padding:0; box-sizing:border-box; transition: background 0.3s, color 0.3s; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        .nav {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 10px 5%; background: var(--nav-bg);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .logo-area img { height: 75px; width: auto; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .menu-btns { display: flex; gap: 8px; }
        .menu-btns a { 
            text-decoration: none; color: var(--text); font-weight: 600; font-size: 0.85rem;
            padding: 10px 18px; border-radius: 12px; border: 1px solid var(--border); background: var(--glass);
        }
        .ctrl-btn { background: var(--text); color: var(--bg); border: none; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.8rem; }

        .section { padding: 40px 10%; }
        .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .map-wrapper { width: 100%; height: 400px; border-radius: 25px; overflow: hidden; border: 2px solid var(--primary); }
        .map-wrapper iframe { width: 100%; height: 100%; border: none; filter: var(--map-filter); }

        .form-box { background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid var(--border); max-width: 950px; margin: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        [dir="rtl"] .form-grid { text-align: right; }
        
        .form-header { grid-column: span 2; color: var(--primary); font-weight: 800; border-bottom: 2px solid var(--primary); margin: 25px 0 10px; font-size: 0.95rem; text-transform: uppercase; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.75rem; font-weight: 700; opacity: 0.6; }
        input { padding: 14px; border-radius: 10px; border: 1px solid var(--border); outline: none; background: rgba(128,128,128,0.05); color: var(--text); font-family: inherit; }
        .full { grid-column: span 2; }
        
        .submit-btn { 
            grid-column: span 2; background: var(--primary); border: none; padding: 20px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 30px; font-size: 1.1rem; color: #000;
        }

        /* NOUVEAUX STYLES POUR FORMSPREE */
        #status-success { display: none; background: #27ae60; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        #status-error { display: none; background: #e74c3c; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; font-weight: bold; }

        .step { background: var(--glass); padding: 20px; margin-bottom: 10px; border-radius: 15px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; font-weight: 600; }
        .step.active { border-left: 6px solid var(--primary); background: #fff; }
        [dir="rtl"] .step.active { border-left: none; border-right: 6px solid var(--primary); }
    </style>
</head>
<body id="body">

    <nav class="nav">
        <div class="logo-area"><img src="logo.png" alt="REVO EXPRESS"></div>
        <div class="nav-right">
            <div class="menu-btns">
                <a href="#services" id="m-services">Services</a>
                <a href="#order" id="m-order">Order</a>
                <a href="#tracking" id="m-track">Tracking</a>
            </div>
            <button class="ctrl-btn" onclick="toggleLang()" id="lang-btn">AR</button>
            <button class="ctrl-btn" onclick="toggleTheme()" id="theme-btn">Dark Mode</button>
        </div>
    </nav>

    <header class="hero">
        <h1 id="hero-title">Livraison Premium</h1>
        <p id="hero-desc">La logistique intelligente à Alger.</p>
    </header>

    <section id="map-area" class="section">
        <div class="map-wrapper">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d102334.35418197964!2d3.0039268!3d36.7285153!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x128fb2179836471d%3A0x66f68e0d4c72ef21!2sAlger!5e0!3m2!1sfr!2sdz!4v1715800000000!5m2!1sfr!2sdz"></iframe>
        </div>
    </section>

    <!-- SECTION COMMANDE -->
    <section id="order" class="section">
        <div class="form-box">
            <!-- Zones pour les messages de succès ou d'erreur -->
            <div id="status-success" data-fs-success>Merci ! Votre commande a été envoyée.</div>
            <div id="status-error" data-fs-error>Oups ! Il y a eu un problème. Réessayez.</div>

            <form class="form-grid" id="my-form">
                
                <!-- SECTION EXPÉDITEUR -->
                <div class="form-header" id="f-head-1">Expéditeur (Sender)</div>
                <div class="field">
                    <label id="l-nom1">Nom</label>
                    <input type="text" name="sender_nom" data-fs-field required>
                </div>
                <div class="field">
                    <label id="l-pre1">Prénom</label>
                    <input type="text" name="sender_prenom" data-fs-field required>
                </div>
                <div class="field">
                    <label id="l-tel1">Téléphone</label>
                    <input type="tel" name="sender_tel" data-fs-field required>
                </div>
                <div class="field">
                    <label id="l-em1">Email</label>
                    <input type="email" name="sender_email" data-fs-field>
                </div>
                <div class="field full">
                    <label id="l-adr1">Adresse d'expédition</label>
                    <input type="text" name="sender_adresse" data-fs-field required>
                </div>

                <!-- SECTION DESTINATAIRE -->
                <div class="form-header" id="f-head-2">Destinataire (Recipient)</div>
                <div class="field">
                    <label id="l-nom2">Nom</label>
                    <input type="text" name="dest_nom" data-fs-field required>
                </div>
                <div class="field">
                    <label id="l-pre2">Prénom</label>
                    <input type="text" name="dest_prenom" data-fs-field required>
                </div>
                <div class="field">
                    <label id="l-tel2">Téléphone</label>
                    <input type="tel" name="dest_tel" data-fs-field required>
                </div>
                <div class="field full">
                    <label id="l-adr2">Adresse de livraison</label>
                    <input type="text" name="dest_adresse" data-fs-field required>
                </div>

                <!-- SECTION PRODUIT -->
                <div class="form-header" id="f-head-3">Détails du Produit</div>
                <div class="field full">
                    <label id="l-cont">Nom du produit / Contenu</label>
                    <input type="text" name="produit_nom" data-fs-field required>
                </div>
                <div class="field">
                    <label id="l-poids">Poids (kg)</label>
                    <input type="text" name="produit_poids" data-fs-field>
                </div>
                <div class="field">
                    <label id="l-dim">Dimensions</label>
                    <input type="text" name="produit_dimensions" data-fs-field>
                </div>

                <button type="submit" class="submit-btn" id="btn-valider" data-fs-submit-btn>VALIDER LA COMMANDE</button>
            </form>
        </div>
    </section>

    <!-- [Le reste de tes sections (Tracking, Services) reste identique] -->

    <script>
        // --- LOGIQUE DE LANGUE ET THÈME ---
        const texts = {
            fr: {
                mSer: "Services", mOrd: "Order", mTra: "Tracking", hT: "Livraison Premium", hD: "La logistique intelligente à Alger.",
                fh1: "Expéditeur (Sender)", fh2: "Destinataire (Recipient)", fh3: "Détails du Produit",
                lNom: "Nom", lPre: "Prénom", lTel: "Téléphone", lEm: "Email", lAdrA: "Adresse d'expédition", lAdrB: "Adresse de livraison",
                lCont: "Nom du produit / Contenu", lPoids: "Poids (kg)", lDim: "Dimensions", btnV: "VALIDER LA COMMANDE", langBtn: "AR",
                success: "Merci ! Votre commande a été envoyée.", error: "Oups ! Il y a eu un problème."
            },
            ar: {
                mSer: "خدماتنا", mOrd: "طلب", mTra: "تتبع", hT: "توصيل بريميوم", hD: "الخدمات اللوجستية الذكية في الجزائر.",
                fh1: "المرسل", fh2: "المرسل إليه", fh3: "بيانات الطرد",
                lNom: "اللقب", lPre: "الاسم", lTel: "الهاتف", lEm: "الإيميل", lAdrA: "عنوان الاستلام", lAdrB: "عنوان التوصيل",
                lCont: "محتوى المنتج", lPoids: "الوزن (كلغ)", lDim: "الأبعاد", btnV: "تأكيد الطلب", langBtn: "FR",
                success: "شكراً! تم إرسال طلبك.", error: "خطأ! يرجى المحاولة مرة أخرى."
            }
        };

        let currentLang = 'fr';
        function toggleLang() {
            currentLang = (currentLang === 'fr') ? 'ar' : 'fr';
            const lang = texts[currentLang];
            document.documentElement.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('m-services').innerText = lang.mSer;
            document.getElementById('m-order').innerText = lang.mOrd;
            document.getElementById('m-track').innerText = lang.mTra;
            document.getElementById('hero-title').innerText = lang.hT;
            document.getElementById('hero-desc').innerText = lang.hD;
            document.getElementById('f-head-1').innerText = lang.fh1;
            document.getElementById('f-head-2').innerText = lang.fh2;
            document.getElementById('f-head-3').innerText = lang.fh3;
            document.getElementById('btn-valider').innerText = lang.btnV;
            document.getElementById('lang-btn').innerText = lang.langBtn;
            document.getElementById('status-success').innerText = lang.success;
            document.getElementById('status-error').innerText = lang.error;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('theme-btn');
            btn.innerText = document.body.classList.contains('dark-mode') ? "Light Mode" : "Dark Mode";
        }

        // --- BRANCHEMENT FORMSPREE ---
        window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
        formspree('initForm', { 
            formElement: '#my-form', 
            formId: 'xnjlgenw',
            onSuccess: function() {
                document.getElementById('my-form').style.display = 'none'; // On cache le formulaire après envoi
                document.getElementById('status-success').style.display = 'block';
            }
        });
    </script>

    <!-- Chargement de la bibliothèque magique de Formspree -->
    <script src="https://unpkg.com/@formspree/ajax@1" defer&gt;&lt;/script&gt;

</body>
</html>
