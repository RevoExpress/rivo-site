<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVO EXPRESS – Premium Delivery</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f9fafb;
            --text: #111827;
            --primary: #f39c12;
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.08);
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        body.dark-mode {
            --bg: #0b1220;
            --text: #f3f4f6;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(11, 18, 32, 0.9);
        }

        [dir="rtl"] { font-family: 'Cairo', sans-serif; }
        [dir="ltr"] { font-family: 'Inter', sans-serif; }

        * { margin:0; padding:0; box-sizing:border-box; transition: all 0.3s ease; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* NAVIGATION */
        .nav {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 10px 5%; background: var(--nav-bg);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; }
        .nav img { height: 70px; width: auto; } /* Logo bien visible */

        .nav-right { display: flex; align-items: center; gap: 10px; }
        
        .menu-btns { display: flex; gap: 8px; }
        .menu-btns a { 
            text-decoration: none; color: var(--text); font-weight: 600; font-size: 0.8rem;
            padding: 8px 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass);
        }
        .menu-btns a:hover { border-color: var(--primary); color: var(--primary); }

        .ctrl-btn {
            background: var(--text); color: var(--bg); border: none; 
            padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.75rem;
        }

        .section { padding: 80px 10% 40px; }
        .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }

        .form-box { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--border); max-width: 800px; margin: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        [dir="rtl"] .form-grid { text-align: right; }
        
        .form-header { grid-column: span 2; color: var(--primary); font-weight: 800; border-bottom: 2px solid var(--primary); margin: 15px 0 5px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.7rem; font-weight: 700; opacity: 0.6; }
        input { padding: 12px; border-radius: 8px; border: 1px solid var(--border); outline: none; }
        .full { grid-column: span 2; }
        
        .submit-btn { 
            grid-column: span 2; background: var(--primary); border: none; padding: 15px; 
            border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 20px; 
        }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .card h3 { color: var(--primary); margin-bottom: 10px; }

        .step { background: var(--glass); padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .step.active { border-left: 5px solid var(--primary); background: #fff; }
        [dir="rtl"] .step.active { border-left: none; border-right: 5px solid var(--primary); }

        @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } .menu-btns { display: none; } }
    </style>
</head>
<body id="body">

    <nav class="nav">
        <div class="logo-area">
            <img src="logo.png" alt="REVO EXPRESS Logo">
        </div>
        <div class="nav-right">
            <div class="menu-btns">
                <a href="#services" id="m-services">Services</a>
                <a href="#order" id="m-order">Order</a>
                <a href="#tracking" id="m-track">Tracking</a>
            </div>
            <button class="ctrl-btn" onclick="toggleLang()" id="lang-btn">AR</button>
            <button class="ctrl-btn" onclick="toggleTheme()" id="theme-btn">Dark Mode</button>
        </div>
    </nav>

    <header class="hero">
        <h1 id="hero-title">Livraison Premium</h1>
        <p id="hero-desc">La logistique intelligente à Alger.</p>
    </header>

    <section id="services" class="section">
        <div class="grid-3">
            <div class="card"><h3 id="s1-t">B2B</h3><p id="s1-d">Documents et colis pros.</p></div>
            <div class="card"><h3 id="s2-t">E-commerce</h3><p id="s2-d">Livraison boutiques en ligne.</p></div>
            <div class="card"><h3 id="s3-t">Urgent</h3><p id="s3-d">Coursiers moto express.</p></div>
        </div>
    </section>

    <section id="order" class="section">
        <div class="form-box">
            <form class="form-grid">
                <div class="form-header" id="f-head-1">EXPÉDITEUR</div>
                <div class="field"><label id="l-nom1">Nom</label><input type="text" placeholder="Nom"></div>
                <div class="field"><label id="l-tel1">Téléphone</label><input type="tel" placeholder="05XXXXXXXX"></div>
                <div class="field full"><label id="l-adr1">Adresse de ramassage</label><input type="text" placeholder="Adresse complète"></div>

                <div class="form-header" id="f-head-2">DESTINATAIRE</div>
                <div class="field"><label id="l-nom2">Nom</label><input type="text" placeholder="Nom"></div>
                <div class="field"><label id="l-tel2">Téléphone</label><input type="tel" placeholder="05XXXXXXXX"></div>
                <div class="field full"><label id="l-adr2">Adresse de livraison</label><input type="text" placeholder="Adresse complète"></div>

                <div class="form-header" id="f-head-3">PRODUIT</div>
                <div class="field"><label id="l-poids">Poids</label><input type="text" placeholder="ex: 2kg"></div>
                <div class="field"><label id="l-dim">Dimensions</label><input type="text" placeholder="ex: 20x20cm"></div>

                <button type="submit" class="submit-btn" id="btn-valider">VALIDER LA COMMANDE</button>
            </form>
        </div>
    </section>

    <section id="tracking" class="section">
        <div style="max-width:500px; margin:auto;">
            <div class="step active" id="t1">📦 Commande Reçue</div>
            <div class="step" id="t2">🏍️ Livreur en route</div>
            <div class="step" id="t3">✅ Livré</div>
        </div>
    </section>

    <script>
        const texts = {
            fr: {
                mSer: "Services", mOrd: "Order", mTra: "Tracking",
                hT: "Livraison Premium", hD: "La logistique intelligente à Alger.",
                s1t: "B2B", s1d: "Documents et colis pros.",
                s2t: "E-commerce", s2d: "Livraison boutiques en ligne.",
                s3t: "Urgent", s3d: "Coursiers moto express.",
                fh1: "EXPÉDITEUR", fh2: "DESTINATAIRE", fh3: "PRODUIT",
                lNom: "Nom", lTel: "Téléphone", lAdrA: "Adresse de ramassage", lAdrB: "Adresse de livraison",
                lPoids: "Poids", lDim: "Dimensions", btnV: "VALIDER LA COMMANDE",
                t1: "📦 Commande Reçue", t2: "🏍️ Livreur en route", t3: "✅ Livré",
                langBtn: "AR"
            },
            ar: {
                mSer: "خدماتنا", mOrd: "طلب", mTra: "تتبع",
                hT: "توصيل بريميوم", hD: "الخدمات اللوجستية الذكية في الجزائر العاصمة.",
                s1t: "شركات", s1d: "وثائق و طرود مهنية.",
                s2t: "تجارة إلكترونية", s2d: "توصيل المتاجر عبر الإنترنت.",
                s3t: "عاجل", s3d: "ساعي دراجة نارية سريع.",
                fh1: "المرسل", fh2: "المرسل إليه", fh3: "المنتج",
                lNom: "الاسم", lTel: "الهاتف", lAdrA: "عنوان الاستلام", lAdrB: "عنوان التوصيل",
                lPoids: "الوزن", lDim: "الأبعاد", btnV: "تأكيد الطلب",
                t1: "📦 تم استلام الطلب", t2: "🏍️ السائق في الطريق", t3: "✅ تم التوصيل",
                langBtn: "FR"
            }
        };

        let currentLang = 'fr';

        function toggleLang() {
            currentLang = (currentLang === 'fr') ? 'ar' : 'fr';
            const lang = texts[currentLang];
            
            document.documentElement.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;

            document.getElementById('m-services').innerText = lang.mSer;
            document.getElementById('m-order').innerText = lang.mOrd;
            document.getElementById('m-track').innerText = lang.mTra;
            document.getElementById('hero-title').innerText = lang.hT;
            document.getElementById('hero-desc').innerText = lang.hD;
            document.getElementById('s1-t').innerText = lang.s1t; document.getElementById('s1-d').innerText = lang.s1d;
            document.getElementById('s2-t').innerText = lang.s2t; document.getElementById('s2-d').innerText = lang.s2d;
            document.getElementById('s3-t').innerText = lang.s3t; document.getElementById('s3-d').innerText = lang.s3d;
            document.getElementById('f-head-1').innerText = lang.fh1;
            document.getElementById('f-head-2').innerText = lang.fh2;
            document.getElementById('f-head-3').innerText = lang.fh3;
            document.getElementById('l-nom1').innerText = lang.lNom; document.getElementById('l-nom2').innerText = lang.lNom;
            document.getElementById('l-tel1').innerText = lang.lTel; document.getElementById('l-tel2').innerText = lang.lTel;
            document.getElementById('l-adr1').innerText = lang.lAdrA; document.getElementById('l-adr2').innerText = lang.lAdrB;
            document.getElementById('l-poids').innerText = lang.lPoids; document.getElementById('l-dim').innerText = lang.lDim;
            document.getElementById('btn-valider').innerText = lang.btnV;
            document.getElementById('t1').innerText = lang.t1;
            document.getElementById('t2').innerText = lang.t2;
            document.getElementById('t3').innerText = lang.t3;
            document.getElementById('lang-btn').innerText = lang.langBtn;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('theme-btn');
            if(document.body.classList.contains('dark-mode')) {
                btn.innerText = "Light Mode";
            } else {
                btn.innerText = "Dark Mode";
            }
        }
    </script>
</body>
</html>
